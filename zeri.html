<style>
  :root{
    --ink:#14171f;
    --ink-2:#1c202b;
    --paper:#e8dfc8;
    --paper-2:#ddd2b4;
    --vermillion:#a6352c;
    --vermillion-dim:#7d281f;
    --brass:#b08d4f;
    --brass-dim:#8a6f3d;
    --text-pale:#c9c2ac;
    --text-dim:#8a8570;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, #23283a 0%, transparent 55%),
      radial-gradient(ellipse at 90% 110%, #241b1b 0%, transparent 50%),
      var(--ink);
    color:var(--text-pale);
    font-family:"Noto Sans SC", sans-serif;
    min-height:100vh;
    padding:28px 16px 60px;
  }
  .wrap{max-width:520px;margin:0 auto;}
  header{display:flex;align-items:center;gap:16px;margin-bottom:24px;}
  .seal{
    flex:none;width:52px;height:52px;border-radius:50%;
    border:2px solid var(--vermillion);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    background:rgba(166,53,44,.06);
  }
  .seal img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  h1{font-family:"Noto Serif SC",serif;font-weight:700;font-size:22px;margin:0;color:#f2ede0;letter-spacing:.03em;}
  .sub{font-size:12px;color:var(--text-dim);margin-top:4px;}
  .card{
    background:var(--ink-2);
    border:1px solid rgba(176,141,79,.25);
    border-radius:4px;
    padding:20px 18px;
    margin-bottom:20px;
  }
  .section-title{
    font-family:"Noto Serif SC",serif;font-weight:700;font-size:15px;
    color:#f2ede0;margin-bottom:14px;letter-spacing:.02em;
  }
  .field{margin-bottom:16px;}
  .field:last-child{margin-bottom:0;}
  label{
    display:block;font-size:12px;color:var(--brass);
    letter-spacing:.06em;margin-bottom:7px;font-weight:500;
  }
  select, input[type=number]{
    background:#0e1017;border:1px solid rgba(176,141,79,.3);
    color:#e8dfc8;border-radius:3px;padding:9px 8px;font-size:13px;
    font-family:"Noto Sans SC",sans-serif;width:100%;
  }
  .ymd{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:8px;}
  .hm{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
  .gender-tabs{display:flex;gap:8px;}
  .gender-tab{
    flex:1;padding:9px 0;text-align:center;border-radius:3px;
    background:#0e1017;border:1px solid rgba(176,141,79,.3);
    color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;
  }
  .gender-tab.active{background:rgba(176,141,79,.25);border-color:var(--brass);color:#e8dfc8;}
  button.go{
    width:100%;padding:12px 0;border:none;border-radius:3px;
    background:linear-gradient(180deg, var(--vermillion) 0%, var(--vermillion-dim) 100%);
    color:#f2ede0;font-size:14px;font-weight:700;letter-spacing:.08em;
    cursor:pointer;font-family:"Noto Sans SC",sans-serif;
  }
  button.go.secondary{
    background:#0e1017;border:1px solid var(--brass);color:var(--brass);
  }
  .confirmed-note{
    display:none;margin-top:10px;font-size:12px;color:var(--brass);
    text-align:center;
  }
  .r-headline{text-align:center;padding:6px 0 14px;border-bottom:1px solid rgba(176,141,79,.25);margin-bottom:14px;}
  .r-date{font-size:12px;color:var(--text-dim);margin-bottom:4px;}
  .r-gz{font-family:"Noto Serif SC",serif;font-size:15px;color:#f2ede0;letter-spacing:1px;margin-bottom:6px;}
  .r-name{font-family:"Noto Serif SC",serif;font-weight:900;font-size:26px;color:var(--vermillion);letter-spacing:2px;}
  .yj-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(176,141,79,.12);font-size:12.5px;line-height:1.6;}
  .yj-row:last-child{border-bottom:none;}
  .yj-tag{flex:none;width:28px;text-align:center;font-weight:700;border-radius:3px;padding:2px 0;height:20px;}
  .yj-tag.yi{background:rgba(176,141,79,.35);color:#e8dfc8;}
  .yj-tag.ji{background:rgba(166,53,44,.35);color:#e8dfc8;}
  .yj-text{flex:1;color:var(--text-pale);}
  .hhd-name{font-family:"Noto Serif SC",serif;font-weight:700;font-size:17px;margin-bottom:8px;}
  .hhd-name.huang{color:var(--brass);}
  .hhd-name.hei{color:var(--vermillion);}
  .hhd-text{font-size:12.5px;line-height:1.75;color:var(--text-pale);}
  .cs-row{display:flex;gap:10px;padding:8px 0;font-size:13px;}
  .cs-label{flex:none;width:28px;color:var(--brass);font-weight:700;}
  .cs-value{color:var(--text-pale);}
  .p-empty{font-size:12px;color:var(--text-dim);line-height:1.7;}
  .p-text{font-size:12.5px;color:var(--text-pale);line-height:1.8;}
  .p-text b{color:var(--brass);}
  .footnote{font-size:10.5px;color:var(--text-dim);line-height:1.7;margin-top:6px;}
</style>
</head>

<script>
/* ============================================================
   核心引擎：复用自 bazi.html（天文算法、干支排盘、十神、真太阳时）
   ============================================================ */
const GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const ZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const GAN_WX = ['木','木','火','火','土','土','金','金','水','水']; // 天干五行
const ZHI_WX = ['水','土','木','木','土','火','火','土','金','金','土','水']; // 地支五行（本气）

function norm360(x){return ((x%360)+360)%360;}
function deg2rad(d){return d*Math.PI/180;}

// y,m,d,hour,min 均为“北京时间”（UTC+8），内部转换为UT计算JD
function toJD_UT(y,m,d,hour,min){
  let Y=y, M=m;
  if(M<=2){Y-=1;M+=12;}
  const A=Math.floor(Y/100);
  const B=2-A+Math.floor(A/4);
  const hourUT = hour - 8 + min/60; // 转世界时
  const dayFrac = d + hourUT/24;
  return Math.floor(365.25*(Y+4716)) + Math.floor(30.6001*(M+1)) + dayFrac + B - 1524.5;
}
function deg2rad(d){return d*Math.PI/180;}

// y,m,d,hour,min 均为“北京时间”（UTC+8），内部转换为UT计算JD
function toJD_UT(y,m,d,hour,min){
  let Y=y, M=m;
  if(M<=2){Y-=1;M+=12;}
  const A=Math.floor(Y/100);
  const B=2-A+Math.floor(A/4);

  const dayFrac = d + hourUT/24;

function sunApparentLongitude(jd){
  const T=(jd-2451545.0)/36525;
  const L0=norm360(280.46646+36000.76983*T+0.0003032*T*T);
  const M=norm360(357.52911+35999.05029*T-0.0001537*T*T);
  const Mr=deg2rad(M);
  const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)
         +(0.019993-0.000101*T)*Math.sin(2*Mr)
         +0.000289*Math.sin(3*Mr);
  const trueLong=L0+C;
  const omega=125.04-1934.136*T;
  const appLong=trueLong-0.00569-0.00478*Math.sin(deg2rad(omega));
  return norm360(appLong);
}
function monthBracketIndex(solarLong){
  return Math.floor(norm360(solarLong-315)/30);
}
function jdnOf(y,m,d){
  const ms = Date.UTC(y, m-1, d);
  return Math.floor(ms/86400000) + 2440588;
}
function dayGanzhiIndex(y,m,d){
  const jdn = jdnOf(y,m,d);
  return ((jdn - 2415011) % 60 + 60) % 60;
}
const WUHU_BASE = [2,4,6,8,0]; // 甲己->丙(2) 乙庚->戊(4) 丙辛->庚(6) 丁壬->壬(8) 戊癸->甲(0)
// 五鼠遁：日干 -> 子时(hour branch0) 时干基数
const WUSHU_BASE = [0,2,4,6,8]; // 甲己->甲(0) 乙庚->丙(2) 丙辛->戊(4) 丁壬->庚(6) 戊癸->壬(8)

function computeBazi(y,m,d,hour,min,trueSolar){
  const ts = trueSolar || {y,m,d,hour,min};

  // 子时固定以23:00为日界：23:00-23:59 的日柱、时柱一律进位算作次日（按真太阳时判断）
  let dayY=ts.y, dayM=ts.m, dayD=ts.d;
  if(ts.hour===23){
    const next = new Date(Date.UTC(ts.y,ts.m-1,ts.d+1));
    dayY=next.getUTCFullYear(); dayM=next.getUTCMonth()+1; dayD=next.getUTCDate();
  }

  // 太阳视黄经（用原始输入时刻，用于年/月柱判定——节气交接与出生地经度无关）
  const jd = toJD_UT(y,m,d,hour,min);
  const solarLong = sunApparentLongitude(jd);
  const bracket = monthBracketIndex(solarLong); // 0..11, 0=寅(立春起)

  // 八字年：以立春为界
  let baziYear = y;
  if(bracket===11){ baziYear -= 1; }
  else if(bracket===10 && m===1){ baziYear -= 1; }

  const yearGan = ((baziYear-4)%10+10)%10;
  const yearZhi = ((baziYear-4)%12+12)%12;
  const yearIndex60 = (()=>{ // 还原为0-59的甲子序号，便于取纳音
    for(let i=0;i<60;i++){ if(i%10===yearGan && i%12===yearZhi) return i; }
    return 0;
  })();

  // 月柱
  const wuhuBase = WUHU_BASE[yearGan%5];
  const monthGan = (wuhuBase + bracket)%10;
  const monthZhi = (bracket+2)%12; // bracket0=寅=zhi2
  const monthIndex60 = (()=>{
    for(let i=0;i<60;i++){ if(i%10===monthGan && i%12===monthZhi) return i; }
    return 0;
  })();

  // 日柱（按真太阳时修正后的日期）
  const dayIdx = dayGanzhiIndex(dayY,dayM,dayD);
  const dayGan = dayIdx%10;

  // 时柱（子时在 23:00-00:59，按真太阳时修正后的时刻判定时辰）
  const hourBranch = Math.floor((((ts.hour+1)%24))/2);
  const wushuBase = WUSHU_BASE[dayGan%5];
  const hourGan = (wushuBase + hourBranch)%10;
  const hourIndex60 = (()=>{
    for(let i=0;i<60;i++){ if(i%10===hourGan && i%12===hourBranch) return i; }
    return 0;
  })();

  return {
    solarLong, bracket, baziYear,
    year:{gan:yearGan, zhi:yearZhi, idx:yearIndex60},
    month:{gan:monthGan, zhi:monthZhi, idx:monthIndex60},
    day:{gan:dayGan, zhi:dayIdx%12, idx:dayIdx},
    hour:{gan:hourGan, zhi:hourBranch, idx:hourIndex60}
  };
}
function equationOfTimeMinutes(y,m,d){
  const start = Date.UTC(y,0,1);
  const cur = Date.UTC(y,m-1,d);
  const N = Math.floor((cur-start)/86400000) + 1; // 当年第几天
  const B = 2*Math.PI*(N-81)/365;
  return 9.87*Math.sin(2*B) - 7.53*Math.cos(B) - 1.5*Math.sin(B);
}
function trueSolarAdjust(y,m,d,hour,min,longitude){
  const eot = equationOfTimeMinutes(y,m,d);
  const correctionMin = -(120-longitude)*4 + eot;
  const base = Date.UTC(y,m-1,d,hour,min) + correctionMin*60000;
  const dt = new Date(base);
  return {
    y:dt.getUTCFullYear(), m:dt.getUTCMonth()+1, d:dt.getUTCDate(),
    hour:dt.getUTCHours(), min:dt.getUTCMinutes(),
    correctionMin
  };
}

function tenGodOf(dayGanIdx, targetGanIdx){
  const dayElem = Math.floor(dayGanIdx/2);
  const targetElem = Math.floor(targetGanIdx/2);
  const sameYY = (dayGanIdx%2) === (targetGanIdx%2);
  if(dayElem === targetElem) return sameYY ? '比肩' : '劫财';
  if((dayElem+1)%5 === targetElem) return sameYY ? '食神' : '伤官';
  if((dayElem+2)%5 === targetElem) return sameYY ? '偏财' : '正财';
  if((targetElem+2)%5 === dayElem) return sameYY ? '七杀' : '正官';
  if((targetElem+1)%5 === dayElem) return sameYY ? '偏印' : '正印';
  return '';
}

  '比肩':'帮身', '劫财':'帮身', '正印':'帮身', '偏印':'帮身',

function analyzeStrength(r){
  const dayGanIdx = r.day.gan;
  const dayElem = Math.floor(dayGanIdx/2);

  const items = []; // {stemIdx, weight}
  items.push({stemIdx:r.year.gan, weight:1.0});
  items.push({stemIdx:r.month.gan, weight:1.0});
  items.push({stemIdx:r.hour.gan, weight:1.0});

  const branches = [
    {zhi:r.year.zhi, isMonth:false},
    {zhi:r.month.zhi, isMonth:true}, // 月支：月令，权重加倍
    {zhi:r.day.zhi, isMonth:false},
    {zhi:r.hour.zhi, isMonth:false}
  ];
  branches.forEach(b=>{
    BRANCH_HIDDEN[b.zhi].forEach((stemIdx, idx)=>{
      let w = idx===0 ? 1.0 : 0.3; // 本气1.0，中气/余气0.3
      if(b.isMonth) w *= 2;
      items.push({stemIdx, weight:w});
    });
  });

  const elemScore = [0,0,0,0,0]; // 木火土金水 五行总分（不分帮耗，用于用神选择）
  let bangScore=0, haoScore=0;
  items.forEach(it=>{
    const elem = Math.floor(it.stemIdx/2);
    elemScore[elem]+=it.weight;
    const sg = tenGodOf(dayGanIdx, it.stemIdx);
    if(SHISHEN_CAMP[sg]==='帮身') bangScore+=it.weight; else haoScore+=it.weight;
  });

  const total = bangScore+haoScore;
  const diff = bangScore-haoScore;
  let verdict;
  if(Math.abs(diff) < total*0.15) verdict='中和';
  else verdict = diff>0 ? '身强' : '身弱';

  const FIVE_ELEM_NAMES = ['木','火','土','金','水'];
  let yongElem, yongReason;
  if(verdict==='身强'){
    const candidates = [(dayElem+1)%5, (dayElem+2)%5, (dayElem+3)%5]; // 食伤/财/官杀
    candidates.sort((a,b)=>elemScore[b]-elemScore[a]);
    yongElem = candidates[0];
    yongReason = '日主偏强，取克泄耗日主中力量最旺的一行为用神，助其宣泄或制衡。';
  } else if(verdict==='身弱'){
    const yinElem = (dayElem+4)%5; // 生我
    if(elemScore[yinElem] > 0){
      yongElem = yinElem;
      yongReason = '日主偏弱，取生扶日主的印星一行为用神，助其得生。';
    } else {
      yongElem = dayElem;
      yongReason = '日主偏弱且盘中印星几乎无根，改取日主本气（比劫）一行为用神，助其自立。';
    }
  } else {
    yongElem = null;
    yongReason = '日主旺衰接近平衡（中和），此时用神更多取决于调候（寒暖燥湿）等因素，不在扶抑法这套简化逻辑的判断范围内。';
  }

  return {verdict, bangScore, haoScore, elemScore, yongElem, yongElemName: yongElem!==null?FIVE_ELEM_NAMES[yongElem]:null, yongReason};
}

  else if(isBadDay) verdict = '综合来看，这天对你个人不太理想，重要的事建议另择日期。';
  else verdict = '综合来看，这天对你个人喜忌参半，具体要不要用，可以再结合上面建除、黄道黑道的宜忌来定。';
  parts.push(verdict);

  return parts.join('');
}


/* ============================================================
   UI 绑定
   ============================================================ */
function fillSelect(el, from, to, fmt){
  el.innerHTML='';
  for(let i=from;i<=to;i++){
    const opt=document.createElement('option');
    opt.value=i;
    opt.textContent = fmt ? fmt(i) : i;
    el.appendChild(opt);
  }
}
function daysInMonth(y,m){
  return new Date(y, m, 0).getDate();
}

// ---- 出生地下拉 ----
const locSel = document.getElementById('birthLoc');
LOCATION_LIST.forEach(loc=>{
  const opt=document.createElement('option');
  opt.value = loc[1];
  opt.textContent = loc[0];
  locSel.appendChild(opt);
});
const customOpt = document.createElement('option');
customOpt.value = 'custom';
customOpt.textContent = '自定义经度…';
locSel.appendChild(customOpt);
const customWrap = document.getElementById('customLngWrap');
locSel.onchange = function(){
  customWrap.style.display = (this.value==='custom') ? 'block' : 'none';
};
function getBirthLongitude(){
  if(locSel.value==='custom'){
    const v = Number(document.getElementById('customLng').value);
    return isNaN(v) ? null : v;
  }
  return Number(locSel.value);
}

// ---- 生辰输入 ----
const bY=document.getElementById('bY'), bM=document.getElementById('bM'), bD=document.getElementById('bD'),
      bH=document.getElementById('bH'), bMin=document.getElementById('bMin');
fillSelect(bY, 1900, 2050, y=>y+'年');
fillSelect(bM, 1, 12, m=>m+'月');
fillSelect(bH, 0, 23, h=>String(h).padStart(2,'0')+'时');
fillSelect(bMin, 0, 59, m=>String(m).padStart(2,'0')+'分');
function refreshBDays(){
  const y=Number(bY.value), m=Number(bM.value);
  const prevD = Number(bD.value)||1;
  const dim = daysInMonth(y,m);
  fillSelect(bD, 1, dim, d=>d+'日');
  bD.value = Math.min(prevD, dim);
}
bY.onchange = refreshBDays; bM.onchange = refreshBDays;
bY.value=1990; bM.value=1; refreshBDays(); bD.value=1; bH.value=12; bMin.value=0;

let isMale = true;
document.getElementById('genMale').onclick = function(){
  isMale = true;
  this.classList.add('active');
  document.getElementById('genFemale').classList.remove('active');
};
document.getElementById('genFemale').onclick = function(){
  isMale = false;
  this.classList.add('active');
  document.getElementById('genMale').classList.remove('active');
};

// ---- 查询日期输入 ----
const qY=document.getElementById('qY'), qM=document.getElementById('qM'), qD=document.getElementById('qD');
fillSelect(qY, 1900, 2050, y=>y+'年');
fillSelect(qM, 1, 12, m=>m+'月');
function refreshQDays(){
  const y=Number(qY.value), m=Number(qM.value);
  const prevD = Number(qD.value)||1;
  const dim = daysInMonth(y,m);
  fillSelect(qD, 1, dim, d=>d+'日');
  qD.value = Math.min(prevD, dim);
}
qY.onchange = refreshQDays; qM.onchange = refreshQDays;
const todayNow = new Date();
qY.value = todayNow.getFullYear(); qM.value = todayNow.getMonth()+1;
refreshQDays(); qD.value = todayNow.getDate();

// ---- 起盘（存自己的命盘，供个人化对照用） ----
let myChart = null;
document.getElementById('confirmBirthBtn').onclick = function(){
  const y=Number(bY.value), m=Number(bM.value), d=Number(bD.value), h=Number(bH.value), mi=Number(bMin.value);
  const lng = getBirthLongitude();
  let trueSolar = null;
  if(lng!==null && !isNaN(lng)){
    trueSolar = trueSolarAdjust(y,m,d,h,mi,lng);
  }
  const r = computeBazi(y,m,d,h,mi,trueSolar);
  const a = analyzeStrength(r);
  const dayGanIdx = r.day.gan;
  const xiCamp = a.bangScore>=a.haoScore ? '耗身' : '帮身';
  myChart = {r, a, dayGanIdx, xiCamp, isMale};
  document.getElementById('birthConfirmedNote').style.display = 'block';
  document.getElementById('birthConfirmedNote').textContent =
    `${GAN[r.day.gan]}${ZHI[r.day.zhi]}日 · ${xiCamp==='帮身'?'身强':'身弱或中和'}倾向`;
  renderResult(); // 起盘后如果已经查过日期，顺手刷新个人化区块
};

// ---- 查询 ----
function renderResult(){
  const y=Number(qY.value), m=Number(qM.value), d=Number(qD.value);

  const jc = computeJianChu(y,m,d);
  document.getElementById('jcHeadline').innerHTML = `
    <div class="r-date">${y}年${m}月${d}日 · 月建${ZHI[jc.monthZhi]}</div>
    <div class="r-gz">${GAN[jc.dayGan]}${ZHI[jc.dayZhi]}日</div>
    <div class="r-name">${jc.name}日</div>
  `;
  document.getElementById('jcYiJi').innerHTML = `
    <div class="yj-row"><span class="yj-tag yi">宜</span><span class="yj-text">${jc.yiji.yi}</span></div>
    <div class="yj-row"><span class="yj-tag ji">忌</span><span class="yj-text">${jc.yiji.ji}</span></div>
  `;

  const hhd = computeHuangHeiDao(jc.monthZhi, jc.dayZhi);
  document.getElementById('hhdBody').innerHTML = `
    <div class="hhd-name ${hhd.isHuang?'huang':'hei'}">${hhd.shenName}（${hhd.isHuang?'黄道·吉':'黑道·凶'}）</div>
    <div class="hhd-text">${SHEN_TEXT[hhd.shenName]}</div>
  `;

  const cs = computeChongSha(jc.dayZhi);
  document.getElementById('csBody').innerHTML = `
    <div class="cs-row"><span class="cs-label">冲</span><span class="cs-value">${cs.chongShengxiao}</span></div>
    <div class="cs-row"><span class="cs-label">煞</span><span class="cs-value">${cs.shaDir}</span></div>
  `;

  const personalEl = document.getElementById('personalBody');
  if(myChart){
    personalEl.innerHTML = buildPersonalAnalysis(jc, cs, myChart);
  } else {
    personalEl.innerHTML = `<div class="p-empty">还没有起盘——在上面输入你的出生信息、点"确认生辰"之后，这里就会显示针对你个人的具体分析了。</div>`;
  }

  document.getElementById('resultArea').style.display = 'block';
}
document.getElementById('queryBtn').onclick = renderResult;
renderResult(); // 打开页面直接显示今天的结果

</script>
